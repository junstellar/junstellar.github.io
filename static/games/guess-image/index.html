<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 그림 맞히기 — AI 게임 랩</title>
<meta name="description" content="AI가 그린 그림을 3번 안에 맞혀보세요. 빨리 맞힐수록 고득점! 결과를 이모지로 공유!">
<link rel="stylesheet" href="../shared.css">
<style>
  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:14px 18px; max-width:560px; margin:0 auto; }
  .topbar .home{ font-size:.85rem; color:var(--muted); }
  .game{ max-width:520px; margin:0 auto; padding:6px 20px 60px; }
  .title{ text-align:center; margin:6px 0 2px; font-size:1.35rem; }
  .progress{ text-align:center; color:var(--muted); font-size:.85rem; margin:0 0 14px; }

  .imgwrap{
    position:relative; width:100%; aspect-ratio:1/1; border-radius:var(--radius);
    overflow:hidden; background:var(--panel); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center;
  }
  .imgwrap img{ width:100%; height:100%; object-fit:cover; display:block; }
  .imgwrap .placeholder{ font-size:3rem; color:var(--muted); text-align:center; line-height:1.3; padding:20px; }

  .answerbox{ display:flex; gap:8px; margin-top:16px; }
  .answerbox input{
    flex:1; padding:14px 16px; border-radius:12px; border:1px solid var(--border);
    background:var(--panel); color:var(--text); font-size:1.05rem;
  }
  .answerbox input:focus{ outline:none; border-color:var(--accent); background:var(--panel-2); }
  .answerbox input:disabled{ opacity:.6; }

  .options{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
  .opt{
    padding:14px 10px; border-radius:12px; border:1px solid var(--border); background:var(--panel);
    color:var(--text); font-size:1rem; font-weight:600; cursor:pointer; text-align:center;
    transition:background .12s, border-color .12s, transform .06s;
  }
  .opt:hover:not(:disabled){ background:var(--panel-2); }
  .opt:active:not(:disabled){ transform:translateY(1px); }
  .opt:disabled{ cursor:default; }
  .opt.correct{ background:rgba(46,160,67,.18); border-color:var(--good); color:#8ee6a8; }
  .opt.wrong{ background:rgba(229,83,75,.16); border-color:var(--bad); color:#ffb3ae; }

  .attempt-note{ text-align:center; margin:10px 0 0; font-size:.82rem; }
  .hint{ text-align:center; margin-top:12px; color:#c9bcff; font-size:1rem; letter-spacing:normal; min-height:1.3em; font-weight:600; line-height:1.4; }
  .feedback{ text-align:center; margin-top:14px; font-size:1.05rem; font-weight:700; min-height:1.4em; }
  .feedback.ok{ color:#8ee6a8; }
  .feedback.no{ color:#ffb3ae; }
  .next{ margin-top:14px; text-align:center; min-height:52px; }

  .result{ text-align:center; }
  .result .score{ font-size:2.8rem; font-weight:800; margin:10px 0 2px; }
  .result .emoji-grid{ font-size:1.9rem; letter-spacing:5px; margin:8px 0 8px; }
  .result .legend{ font-size:.8rem; color:var(--muted); margin:0 0 16px; }
  .result .actions{ display:flex; flex-direction:column; gap:10px; max-width:280px; margin:0 auto; }
  .mystats{ display:grid; grid-template-columns:1fr 1fr; gap:8px; max-width:300px; margin:0 auto 18px; }
  .mystats .stat{ background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:9px 8px; font-size:.82rem; color:var(--muted); }
  .mystats .stat b{ display:block; color:var(--text); font-size:1.25rem; font-weight:800; margin-top:2px; }
  .reset{ background:none; border:none; color:var(--muted); font-size:.75rem; cursor:pointer; text-decoration:underline; margin-top:16px; }
  .reset:hover{ color:var(--text); }
</style>
</head>
<body>
  <div class="topbar">
    <a class="home" href="../">← 게임 랩</a>
    <span class="badge">🎨 AI 그림 맞히기</span>
    <span style="width:56px"></span>
  </div>

  <main class="game" id="game"></main>

  <script src="../share.js"></script>
  <script src="../stats.js"></script>
  <script src="rounds.js"></script>
  <script>
  /* ==========================================================
     문제 풀은 rounds.js (window.ROUNDS) 에 있습니다.
     한 판에 그 풀에서 무작위 QUESTIONS_PER_GAME 문제를 출제합니다.
     진행: 1차 주관식(+3) → 힌트+2차 주관식(+2) → 객관식(+1) → 실패(0)
     ========================================================== */
  var POOL = (window.ROUNDS || []);
  var QUESTIONS_PER_GAME = 5;          // 한 판당 출제 수 (전체 풀에서 무작위 추첨)

  var POINTS = { first:3, hint:2, choice:1, fail:0 };
  var EMOJI  = { first:'🟩', hint:'🟨', choice:'🟧', fail:'🟥' };

  var game=document.getElementById('game');
  var ROUNDS=[], MAX=QUESTIONS_PER_GAME*3, idx=0, results=[], stage='text1';

  // 새 게임: 풀에서 무작위로 문제를 뽑아 시작 (다시 하기마다 다른 문제)
  function newGame(){
    ROUNDS = shuffle(POOL).slice(0, Math.min(QUESTIONS_PER_GAME, POOL.length));
    MAX = ROUNDS.length * 3;
    idx=0; results=[];
    if(!ROUNDS.length){ game.innerHTML='<p class="muted" style="text-align:center;padding:40px">문제를 불러오지 못했어요 (rounds.js 확인).</p>'; return; }
    renderRound();
  }

  function normalize(s){
    return (s||'').toLowerCase().replace(/\s+/g,'').replace(/[.,!?~"'`()\[\]\-_/]/g,'');
  }
  function isCorrect(guess, need){
    var g=normalize(guess);
    if(!g) return false;
    return need.every(function(group){
      return group.some(function(kw){ return g.indexOf(normalize(kw))>=0; });
    });
  }
  function shuffle(a){
    a=a.slice();
    for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
    return a;
  }

  function renderRound(){
    stage='text1';
    var r=ROUNDS[idx];
    game.innerHTML=
      '<h1 class="title">이게 뭘 그린 걸까요?</h1>'+
      '<p class="progress">'+(idx+1)+' / '+ROUNDS.length+' · 3번 안에 맞히면 됩니다</p>'+
      '<div class="imgwrap">'+
        '<img src="'+r.img+'" alt="AI 그림" '+
             'onerror="this.style.display=\'none\';this.parentNode.querySelector(\'.placeholder\').style.display=\'block\';">'+
        '<div class="placeholder" style="display:none">🎨<br><span style="font-size:.9rem">이미지 준비중</span></div>'+
      '</div>'+
      '<div id="interaction"></div>'+
      '<div class="hint" id="hint"></div>'+
      '<div class="feedback" id="feedback"></div>'+
      '<div class="next" id="next"></div>';
    renderStage();
  }

  function renderStage(){
    var box=document.getElementById('interaction');
    var r=ROUNDS[idx];
    if(stage==='choice'){
      box.innerHTML='<div class="options" id="options"></div>'+
        '<p class="attempt-note muted">3차 시도 · 객관식 (맞히면 +1점)</p>';
      var ob=document.getElementById('options');
      shuffle(r.options).forEach(function(opt){
        var b=document.createElement('button');
        b.className='opt'; b.textContent=opt;
        b.onclick=function(){ choicePick(b, opt); };
        ob.appendChild(b);
      });
    } else {
      var note = stage==='text1' ? '1차 시도 · 그냥 맞혀보세요 (+3점)' : '2차 시도 · 힌트 참고해 다시! (+2점)';
      box.innerHTML=
        '<div class="answerbox">'+
          '<input id="guess" type="text" autocomplete="off" placeholder="예: 우주 고양이 / astronaut cat">'+
          '<button class="btn btn-primary" id="submitbtn">제출</button>'+
        '</div>'+
        '<p class="attempt-note muted">'+note+'</p>';
      var input=document.getElementById('guess');
      document.getElementById('submitbtn').onclick=textSubmit;
      input.addEventListener('keydown', function(e){ if(e.key==='Enter'){ textSubmit(); } });
      input.focus();
    }
  }

  function textSubmit(){
    var input=document.getElementById('guess');
    var val=input.value.trim();
    if(!val){ input.focus(); return; }
    var r=ROUNDS[idx];
    if(isCorrect(val, r.need)){
      finishRound(stage==='text1' ? 'first' : 'hint');
      return;
    }
    if(stage==='text1'){
      stage='text2';
      document.getElementById('hint').textContent='💡 '+(r.hint||'');
      setFeedback('no','❌ 땡! 힌트 나왔어요. 한 번 더 도전! (남은 기회 2번)');
      renderStage();
    } else {
      stage='choice';
      setFeedback('no','❌ 또 틀렸어요. 마지막은 객관식! (맞혀도 +1점)');
      renderStage();
    }
  }

  function choicePick(btn, choice){
    var r=ROUNDS[idx];
    document.querySelectorAll('.opt').forEach(function(b){
      b.disabled=true;
      if(b.textContent===r.answer) b.classList.add('correct');
      else if(b===btn) b.classList.add('wrong');
    });
    finishRound(choice===r.answer ? 'choice' : 'fail');
  }

  function setFeedback(cls, msg){
    var fb=document.getElementById('feedback');
    fb.className='feedback '+cls;
    fb.textContent=msg;
  }

  function finishRound(code){
    results[idx]=code;
    var r=ROUNDS[idx];
    var pts=POINTS[code];
    var input=document.getElementById('guess'); if(input) input.disabled=true;
    var sb=document.getElementById('submitbtn'); if(sb) sb.disabled=true;
    if(code==='fail') setFeedback('no','❌ 아쉬워요… 정답: '+r.answer+'  (+0점)');
    else setFeedback('ok','✅ 정답! — '+r.answer+'  (+'+pts+'점)');
    var label=(idx===ROUNDS.length-1) ? '결과 보기 →' : '다음 문제 →';
    document.getElementById('next').innerHTML='<button class="btn btn-primary" id="nextbtn">'+label+'</button>';
    document.getElementById('nextbtn').onclick=nextRound;
  }

  function nextRound(){
    idx++;
    if(idx>=ROUNDS.length) renderResult();
    else renderRound();
  }

  function renderResult(){
    var total=results.reduce(function(s,c){ return s+POINTS[c]; }, 0);
    var grid=results.map(function(c){ return EMOJI[c]; }).join('');
    var firsts=results.filter(function(c){ return c==='first'; }).length;
    var pct=total/MAX;
    var msg = (firsts===ROUNDS.length) ? '전부 1트 클리어… 천재세요? 🎉'
            : pct>=0.7 ? '훌륭해요! 👍'
            : pct>=0.4 ? '나쁘지 않아요 🙂'
            : '거북이보단 낫죠 🐢';

    // 내 기록 누적 (localStorage · 계정 없음) — 게임당 1번 기록
    var st = window.GameStats ? GameStats.record('guess-image', { score:total, maxScore:MAX })
                              : { streak:1, totalScore:total, bestScore:total, plays:1 };

    game.innerHTML=
      '<div class="result">'+
        '<h1 class="title">'+msg+'</h1>'+
        '<div class="score">'+total+'<span style="font-size:1.2rem;color:var(--muted);font-weight:600"> / '+MAX+'점</span></div>'+
        '<div class="emoji-grid">'+grid+'</div>'+
        '<p class="legend">🟩 1트 +3 · 🟨 힌트 +2 · 🟧 객관식 +1 · 🟥 실패 0</p>'+
        '<div class="mystats">'+
          '<div class="stat">🔥 연속<b>'+st.streak+'일</b></div>'+
          '<div class="stat">Σ 누적<b>'+st.totalScore+'점</b></div>'+
          '<div class="stat">🏆 최고<b>'+st.bestScore+' / '+MAX+'</b></div>'+
          '<div class="stat">🎮 플레이<b>'+st.plays+'판</b></div>'+
        '</div>'+
        '<div class="actions">'+
          '<button class="btn btn-primary" id="share">📤 결과 공유하기</button>'+
          '<button class="btn" id="retry">🔄 다시 하기</button>'+
          '<a class="btn" href="../">🎮 다른 게임 보기</a>'+
        '</div>'+
        '<button class="reset" id="reset">내 기록 초기화</button>'+
      '</div>';
    document.getElementById('share').onclick=function(){
      GameShare.share({
        text:'🎨 AI 그림 맞히기 — '+total+'/'+MAX+'점 · 🔥연속 '+st.streak+'일\n'+grid+'\n🟩3 🟨2 🟧1 🟥0',
        url:'https://junstellar.github.io/games/guess-image/'
      });
    };
    document.getElementById('retry').onclick=function(){ newGame(); };
    document.getElementById('reset').onclick=function(){
      if(window.GameStats) GameStats.reset('guess-image');
      if(window.GameShare) GameShare.toast('내 기록을 초기화했어요');
    };
  }

  newGame();
  </script>
</body>
</html>
