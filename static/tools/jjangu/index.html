<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex">
<title>짱팔 시계</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html,body { height:100%; background:#0b0d12; color:#e8ecf1;
    font-family:'Segoe UI',system-ui,sans-serif; overflow:hidden; }
  #app { min-height:100%; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:2.4vh; padding:6vw 4vw; text-align:center; }
  #clock { font-size:22vw; font-weight:700; letter-spacing:2px; line-height:1;
    font-variant-numeric:tabular-nums; }
  #date { font-size:5vw; color:#8b94a3; }
  #status { font-size:4.8vw; color:#5a6470; min-height:6vw; font-weight:600; }
  #status.live { color:#4ade80; }
  #status.think { color:#fbbf24; }
  #status.heard { color:#7aa2ff; }
  #heard { font-size:4vw; color:#3d4550; min-height:5vw; }
  #startBtn { font-size:7vw; padding:4vw 10vw; border:none; border-radius:4vw;
    background:#7aa2ff; color:#0b0d12; font-weight:700; margin-top:2vh; }
  .hidden { display:none !important; }
  .bubble { max-width:92%; font-size:4.5vw; line-height:1.4; }
  #q { color:#7aa2ff; }
  #vtag { position:fixed; bottom:2vw; right:3vw; font-size:3vw; color:#3d4550; }
</style>
</head>
<body>
<div id="app">
  <div id="clock">--:--</div>
  <div id="date"></div>
  <div id="status">시작하려면 아래 버튼을 누르세요</div>
  <div id="heard"></div>
  <button id="startBtn">🎤 짱팔 시작</button>
  <div class="bubble" id="q"></div>
  <div class="bubble" id="a"></div>
</div>
<div id="vtag"></div>

<script>
/* ===== 설정 ===== */
const MODEL = "gemini-2.5-flash";            // 안 되면 "gemini-2.0-flash"
const WAKE  = "짱팔";
const CITY  = "";  // 예: "서울"
const PERSONA = "너는 '짱팔'이라는 이름의 탁상시계 비서야. 항상 한국어로 2~3문장 이내로 짧고 친근하게 말해. 별표나 샵, 하이픈 같은 기호는 쓰지 마. 실시간 정보가 필요하면 검색해서 최신 사실로 답해.";
const ELEVEN_MODEL = "eleven_multilingual_v2";

/* 키/음성 설정 (폰 저장). #reset=전체초기화, #voice=음성키 재설정 */
if(location.hash === '#reset'){ localStorage.clear(); }
if(location.hash === '#voice'){ localStorage.removeItem('eleven_key'); }
let GEMINI_KEY = localStorage.getItem('gemini_key') || "";
let ELEVEN_KEY = localStorage.getItem('eleven_key');       // null=미설정, "none"=기본음성
let ELEVEN_VOICE = localStorage.getItem('eleven_voice') || "21m00Tcm4TlvDq8ikWAM"; // 기본 Rachel
let elevenBad = false;

function ensureKeys(){
  if(!GEMINI_KEY){
    GEMINI_KEY = (prompt("Gemini API 키 (aistudio.google.com 무료):") || "").trim();
    if(GEMINI_KEY) localStorage.setItem('gemini_key', GEMINI_KEY);
  }
  if(!ELEVEN_KEY || ELEVEN_KEY === "none"){
    const k = (prompt("자연스러운 음성(ElevenLabs) 키를 붙여넣으세요. (sk_ 로 시작)\n없으면 [취소] → 이번엔 기본 음성 (다음 새로고침 때 다시 물어봐요).\n무료: elevenlabs.io") || "").trim();
    if(k){ ELEVEN_KEY = k; localStorage.setItem('eleven_key', k); }
    else  { ELEVEN_KEY = "none"; localStorage.removeItem('eleven_key'); }
  }
  return !!GEMINI_KEY;
}
/* ================ */

const $ = id => document.getElementById(id);

/* --- 시계 --- */
const DAYS = ['일','월','화','수','목','금','토'];
function tick(){
  const d = new Date();
  $('clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  $('date').textContent =
    `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;
}
setInterval(tick, 1000); tick();

/* --- 음성 합성 --- */
let VOICE=null;
function pickVoice(){
  try{
    const vs = speechSynthesis.getVoices().filter(v=>(v.lang||'').toLowerCase().startsWith('ko'));
    VOICE = vs.find(v=>/유나|female|여|Google/i.test(v.name)) || vs[0] || null;
  }catch(e){}
}
if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged = pickVoice; pickVoice(); }

function browserSpeak(text){
  return new Promise(res=>{
    try{
      const u = new SpeechSynthesisUtterance(text);
      u.lang='ko-KR'; if(VOICE) u.voice=VOICE; u.rate=1.02; u.pitch=1.1;
      u.onend=res; u.onerror=res;
      speechSynthesis.cancel(); speechSynthesis.speak(u);
    }catch(e){ res(); }
  });
}

async function speak(text){
  if(!elevenBad && ELEVEN_KEY && ELEVEN_KEY!=="none"){
    try{
      const r = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${ELEVEN_VOICE}`,{
        method:'POST',
        headers:{'xi-api-key':ELEVEN_KEY,'Content-Type':'application/json'},
        body:JSON.stringify({ text, model_id:ELEVEN_MODEL,
          voice_settings:{ stability:0.5, similarity_boost:0.75 } })
      });
      if(r.ok){
        $('vtag').textContent = '🔊 AI음성';
        const blob = await r.blob();
        await new Promise(res=>{
          const a = new Audio(URL.createObjectURL(blob));
          a.onended=res; a.onerror=res; a.play().catch(res);
        });
        return;
      }
      elevenBad = true;
    }catch(e){ elevenBad = true; }
  }
  $('vtag').textContent = '🔊 기본음성';
  await browserSpeak(text);
}

/* --- Gemini (구글 검색 그라운딩) --- */
async function askGemini(text){
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${GEMINI_KEY}`;
  const now = new Date().toLocaleString('ko-KR');
  const loc = CITY ? `사용자는 ${CITY}에 있어. ` : "";
  const prompt = `${PERSONA}\n\n(지금 시각: ${now}) ${loc}\n사용자: ${text}`;
  async function call(useSearch){
    const body = { contents:[{ parts:[{ text: prompt }] }],
                   generationConfig:{ maxOutputTokens: 500 } };
    if(useSearch) body.tools = [{ google_search:{} }];
    const r = await fetch(url,{ method:'POST',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    return r.json();
  }
  try{
    let j = await call(true);
    if(j.error) j = await call(false);
    if(j.error) return "키가 잘못됐거나 막혔어요. 주소 뒤에 #reset 붙여서 다시 입력해줘요.";
    const parts = j?.candidates?.[0]?.content?.parts || [];
    let out = parts.map(p => (p && p.text) ? p.text : '').join('');
    out = out.replace(/[*#_`>]/g,'').replace(/\[\d+\]/g,'').trim();
    return out || "음… 잘 못 들었어요. 다시 말해줄래요?";
  }catch(e){ return "인터넷 연결을 확인해줘요."; }
}

/* --- 웨이크워드 퍼지 매칭 --- */
function matchedWake(heard){
  const m = heard.match(/[짱장]\s?[팔발파빨빠퐈]/);
  return m ? m.index + m[0].length : -1;
}

/* --- 음성 인식: 한 문장씩 깔끔하게 --- */
let rec, busy=false, awaiting=false, flashed=false;
function setStatus(t, cls=''){ $('status').textContent=t; $('status').className=cls; }

function startRec(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ setStatus('이 브라우저는 음성인식 미지원 — 크롬으로 열어주세요'); return; }
  flashed=false;
  rec = new SR();
  rec.lang='ko-KR'; rec.continuous=false; rec.interimResults=true; rec.maxAlternatives=1;
  rec.onresult = onResult;
  rec.onend = ()=>{ if(!busy){ try{ rec.start(); }catch(e){} } };  // 한 문장 끝나면 다시 듣기
  rec.onerror = (e)=>{ if(e && e.error==='not-allowed'){ setStatus('마이크 권한을 허용해주세요'); } };
  try{ rec.start(); }catch(e){}
  if(!awaiting) setStatus(`'${WAKE}아' 하고 불러주세요`, 'live');
}

function onResult(ev){
  if(busy) return;
  let interim='', final='';
  for(let i=ev.resultIndex; i<ev.results.length; i++){
    const t = ev.results[i][0].transcript;
    if(ev.results[i].isFinal) final += t; else interim += t;
  }
  const live = (final + interim).trim();
  $('heard').textContent = live ? '🎧 ' + live : '';

  if(!awaiting && matchedWake(live) >= 0 && !flashed){
    flashed=true; setStatus('✅ 짱팔 인식! 말해봐','heard');
    try{ navigator.vibrate && navigator.vibrate(80); }catch(e){}
  }

  if(!final) return;                 // 최종 결과 나올 때까지 대기
  onFinal(final.trim());
}

async function onFinal(txt){
  const wi = matchedWake(txt);
  if(!awaiting && wi < 0){           // 이름 없음 → 무시
    setTimeout(()=>{ if(!busy) $('heard').textContent=''; }, 800);
    return;
  }
  const cmd = (wi>=0 ? txt.slice(wi) : txt).replace(/^[아야라,.!? ]+/,'').trim();
  if(cmd){ handle(cmd); return; }

  // 이름만 → "응?"
  busy=true; try{rec.stop()}catch(e){}; speechSynthesis.cancel();
  setStatus('네?','heard'); await speak('응?');
  awaiting=true; busy=false; startRec();
}

async function handle(cmd){
  busy = true;
  try{ rec.stop(); }catch(e){}
  speechSynthesis.cancel();
  $('heard').textContent = '';
  $('q').textContent = '❓ ' + cmd;
  $('a').textContent = '';
  setStatus(`${WAKE}이 검색·생각 중…`, 'think');
  const ans = await askGemini(cmd);
  $('a').textContent = '💬 ' + ans;
  setStatus('', 'live');
  await speak(ans);
  awaiting = false; busy = false;
  startRec();
}

/* --- 시작 버튼 --- */
$('startBtn').addEventListener('click', async ()=>{
  if(!ensureKeys()){ alert('Gemini 키가 필요해요.'); return; }
  $('startBtn').classList.add('hidden');
  try{ if('wakeLock' in navigator) await navigator.wakeLock.request('screen'); }catch(e){}
  await speak('짱팔 준비 완료. 부르면 대답할게요.');
  startRec();
});
</script>
</body>
</html>
