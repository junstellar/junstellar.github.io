<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="robots" content="noindex">
<title>짱팔 시계</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html,body { height:100%; background:#0b0d12; color:#e8ecf1;
    font-family:'Segoe UI',system-ui,sans-serif; overflow:hidden; }
  #app { min-height:100%; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:3vh; padding:6vw 4vw; text-align:center; }
  #clock { font-size:22vw; font-weight:700; letter-spacing:2px; line-height:1;
    font-variant-numeric:tabular-nums; }
  #date { font-size:5vw; color:#8b94a3; }
  #status { font-size:4.5vw; color:#5a6470; min-height:6vw; }
  #status.live { color:#4ade80; }
  #status.think { color:#fbbf24; }
  #startBtn { font-size:7vw; padding:4vw 10vw; border:none; border-radius:4vw;
    background:#7aa2ff; color:#0b0d12; font-weight:700; margin-top:2vh; }
  .hidden { display:none !important; }
  .bubble { max-width:92%; font-size:4.5vw; line-height:1.4; }
  #q { color:#7aa2ff; }
</style>
</head>
<body>
<div id="app">
  <div id="clock">--:--</div>
  <div id="date"></div>
  <div id="status">시작하려면 아래 버튼을 누르세요</div>
  <button id="startBtn">🎤 짱팔 시작</button>
  <div class="bubble" id="q"></div>
  <div class="bubble" id="a"></div>
</div>

<script>
/* ===== 설정 ===== */
const MODEL = "gemini-2.5-flash";            // 안 되면 "gemini-2.0-flash"
const WAKE  = "짱팔";                        // 부를 이름
const WAKE_WORDS = ["짱팔","짱팔이","짱발","짱파","짱파리","짱빨"];  // 발음 오인식 대비
const PERSONA = "너는 '짱팔'이라는 이름의 탁상시계 비서야. 항상 한국어로 2~3문장 이내로 짧고 친근하게 말해. 별표나 샵, 하이픈 같은 기호는 쓰지 마. [참고 정보]가 주어지면 반드시 그걸 근거로 답해.";

/* 날씨 코드 → 한국어 */
const WMO = {0:"맑음",1:"대체로 맑음",2:"구름 조금",3:"흐림",45:"안개",48:"짙은 안개",
  51:"약한 이슬비",53:"이슬비",55:"강한 이슬비",61:"약한 비",63:"비",65:"강한 비",
  66:"어는 비",67:"강한 어는 비",71:"약한 눈",73:"눈",75:"강한 눈",77:"싸락눈",
  80:"약한 소나기",81:"소나기",82:"강한 소나기",85:"약한 눈소나기",86:"강한 눈소나기",
  95:"뇌우",96:"우박 뇌우",99:"강한 우박 뇌우"};

/* 키는 파일에 안 박고 폰에 저장. 주소 뒤 #reset 붙이면 키 초기화 */
if(location.hash === '#reset'){ localStorage.removeItem('gemini_key'); }
let GEMINI_KEY = localStorage.getItem('gemini_key') || "";
function ensureKey(){
  if(!GEMINI_KEY){
    GEMINI_KEY = (prompt("Gemini API 키를 입력하세요 (aistudio.google.com 무료):") || "").trim();
    if(GEMINI_KEY) localStorage.setItem('gemini_key', GEMINI_KEY);
  }
  return !!GEMINI_KEY;
}
/* ================ */

const $ = id => document.getElementById(id);

/* --- 시계 --- */
const DAYS = ['일','월','화','수','목','금','토'];
function tick(){
  const d = new Date();
  $('clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  $('date').textContent =
    `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS[d.getDay()]})`;
}
setInterval(tick, 1000); tick();

/* --- 음성 합성 (TTS) --- */
function speak(text){
  return new Promise(res=>{
    try{
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR'; u.rate = 1.05;
      u.onend = res; u.onerror = res;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }catch(e){ res(); }
  });
}

/* --- 실시간 날씨 (Open-Meteo, 키 불필요) --- */
async function getWeather(){
  let lat=37.5665, lon=126.9780;  // 위치 거부 시 서울 기본
  try{
    const pos = await new Promise((res,rej)=>
      navigator.geolocation.getCurrentPosition(res,rej,{timeout:6000}));
    lat=pos.coords.latitude; lon=pos.coords.longitude;
  }catch(e){}
  try{
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m`);
    const c = (await r.json()).current;
    const desc = WMO[c.weather_code] || "";
    return `${desc}, 기온 ${Math.round(c.temperature_2m)}도(체감 ${Math.round(c.apparent_temperature)}도), 바람 ${Math.round(c.wind_speed_10m)} km/h`;
  }catch(e){ return "날씨 정보를 못 가져왔어요"; }
}

/* --- Gemini 호출 --- */
async function askGemini(text, extra=""){
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${GEMINI_KEY}`;
  const prompt = PERSONA + (extra ? "\n\n[참고 정보] " + extra : "") + "\n\n사용자: " + text;
  const body = { contents:[{ parts:[{ text: prompt }] }], generationConfig:{ maxOutputTokens: 300 } };
  try{
    const r = await fetch(url,{ method:'POST',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    const j = await r.json();
    if(j.error){ return "키가 잘못됐거나 막혔어요. 주소 뒤에 #reset 붙여서 다시 입력해줘요."; }
    let out = j?.candidates?.[0]?.content?.parts?.[0]?.text || "";
    out = out.replace(/[*#_`>-]/g,'').trim();
    return out || "음… 잘 못 들었어요. 다시 말해줄래요?";
  }catch(e){ return "인터넷 연결을 확인해줘요."; }
}

/* --- 음성 인식 (STT) + 웨이크워드 --- */
let rec, busy=false, awaiting=false;
function setStatus(t, cls=''){ $('status').textContent=t; $('status').className=cls; }

function matchedWake(heard){
  for(const w of WAKE_WORDS){ if(heard.includes(w)) return w; }
  return null;
}

function startRec(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ setStatus('이 브라우저는 음성인식 미지원 — 크롬으로 열어주세요'); return; }
  rec = new SR();
  rec.lang='ko-KR'; rec.continuous=true; rec.interimResults=false;
  rec.onresult = onResult;
  rec.onend = ()=>{ if(!busy){ try{ rec.start(); }catch(e){} } };
  rec.onerror = (e)=>{ if(e && e.error === 'not-allowed'){ setStatus('마이크 권한을 허용해주세요'); } };
  try{ rec.start(); }catch(e){}
  setStatus(`'${WAKE}아' 하고 불러주세요`, 'live');
}

async function handle(cmd){
  busy = true;
  try{ rec.stop(); }catch(e){}
  speechSynthesis.cancel();
  $('q').textContent = '❓ ' + cmd;
  $('a').textContent = '';
  setStatus(`${WAKE}이 생각 중…`, 'think');

  let extra = "";
  if(/날씨|더워|추워|기온|우산|비\s*오|눈\s*오/.test(cmd)){
    extra = "지금 실제 날씨: " + await getWeather();
  }
  const ans = await askGemini(cmd, extra);

  $('a').textContent = '💬 ' + ans;
  setStatus('', 'live');
  await speak(ans);
  awaiting = false; busy = false;
  startRec();
}

async function onResult(ev){
  if(busy) return;
  const heard = ev.results[ev.results.length-1][0].transcript.trim();
  if(!heard) return;

  const w = matchedWake(heard);
  if(!awaiting && !w) return;              // 대기중도 아니고 이름도 없으면 무시

  let cmd;
  if(w){ cmd = heard.slice(heard.indexOf(w)+w.length).replace(/^[아야,.!? ]+/,'').trim(); }
  else  { cmd = heard.trim(); }            // "응?" 다음 발화 = 질문

  if(cmd){ handle(cmd); return; }          // 이름+질문 한 번에

  // 이름만 불렀음 → "응?" 하고 다음 발화를 질문으로 받기
  busy = true;
  try{ rec.stop(); }catch(e){}
  speechSynthesis.cancel();
  await speak('응?');
  awaiting = true; busy = false;
  startRec();
}

/* --- 시작 버튼 --- */
$('startBtn').addEventListener('click', async ()=>{
  if(!ensureKey()){ alert('Gemini 키가 필요해요.'); return; }
  $('startBtn').classList.add('hidden');
  try{ if('wakeLock' in navigator) await navigator.wakeLock.request('screen'); }catch(e){}
  await speak('짱팔 준비 완료. 부르면 대답할게요.');
  startRec();
});
</script>
</body>
</html>
