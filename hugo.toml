baseURL = "https://junstellar.github.io/"
locale = "ko-kr"
title = "Jun, To the Moon"
theme = "hugo-theme-stack"

# 한국어(CJK) 단어 수/요약 계산을 위해 필요
defaultContentLanguage = "ko"
hasCJKLanguage = true

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 5

[permalinks]
  posts = "/p/:slug/"
  page = "/:slug/"

[params]
  mainSections = ["posts"]
  rssFullContent = true

  [params.footer]
    since = 2026

  [params.sidebar]
    emoji = "🚀"
    subtitle = "AI로 배우고,\n기회에 도전하고,\n캠핑으로 숨 고르는 곳.\n천천히, 그러나 분명히 투더문."
    avatar = "img/avatar.png"

  [params.article]
    math = false
    toc = true
    readingTime = true
    [params.article.license]
      enabled = true
      default = "이 글은 CC BY-NC-SA 4.0 라이선스를 따릅니다."

  [params.colorScheme]
    toggle = true
    default = "auto"   # auto / light / dark

  [params.comments]
    enabled = false

  [params.widgets]
    homepage = [
      { type = "search" },
      { type = "archives", params = { limit = 5 } },
      { type = "categories", params = { limit = 10 } },
      { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [
      { type = "toc" },
    ]

# 사이드바 소셜 링크
[[menu.social]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/junstellar"
  [menu.social.params]
    icon = "brand-github"

# 메뉴(보관함/검색)는 각 페이지(content/page/...)가 직접 정의합니다.

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = true
    startLevel = 2
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
    tabWidth = 4
