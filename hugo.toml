baseURL = "https://junstellar.github.io/"
locale = "ko-kr"
title = "Jun, To the Moon"
theme = "hugo-theme-stack"

# 한국어(CJK) 단어 수/요약 계산을 위해 필요
defaultContentLanguage = "ko"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  pagerSize = 5

[permalinks]
  posts = "/p/:slug/"
  page = "/:slug/"

[params]
  mainSections = ["posts"]
  rssFullContent = true

  [params.footer]
    since = 2026

  [params.sidebar]
    # subtitle은 언어별로 [languages.*.params.sidebar] 에서 지정
    avatar = "img/avatar.png"

  [params.article]
    math = false
    toc = true
    readingTime = true
    [params.article.license]
      enabled = true
      default = "이 글은 CC BY-NC-SA 4.0 라이선스를 따릅니다."

  [params.colorScheme]
    toggle = true
    default = "auto"   # auto / light / dark

  [params.comments]
    enabled = false

  [params.widgets]
    homepage = [
      { type = "search" },
      { type = "archives", params = { limit = 5 } },
      { type = "categories", params = { limit = 10 } },
      { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [
      { type = "toc" },
    ]

# 사이드바 소셜 링크
[[menu.social]]
  identifier = "github"
  name = "GitHub"
  url = "https://github.com/junstellar"
  [menu.social.params]
    icon = "brand-github"

# 메뉴(보관함/검색)는 각 페이지(content/page/...)가 직접 정의합니다.

# === 다국어 (언어 스위처) ===
# 언어 key(ko/en/ja/zh)는 테마 i18n 파일명과 일치해야 UI가 번역됨.
# 한국어 외 사이트는 글이 없으면 비어 보입니다(UI만 번역).
[languages]
  [languages.ko]
    label = "한국어"
    languageName = "한국어"
    title = "Jun, To the Moon"
    weight = 1
    [languages.ko.params.sidebar]
      subtitle = "AI로 배우고,\n기회에 도전하고,\n캠핑으로 숨 고르는 곳.\n천천히, 그러나 분명히 투더문."

  [languages.en]
    label = "English"
    languageName = "English"
    title = "Jun, To the Moon"
    weight = 2
    [languages.en.params.sidebar]
      subtitle = "Learn with AI,\nchase the opportunities,\ncatch a breath by the campfire.\nSlowly, but surely — to the Moon."

  [languages.ja]
    label = "日本語"
    languageName = "日本語"
    title = "Jun, To the Moon"
    weight = 3
    [languages.ja.params.sidebar]
      subtitle = "AIで学び、\nチャンスに挑み、\nキャンプで一息つく場所。\nゆっくり、それでも確かに — To the Moon。"

  [languages.zh]
    label = "简体中文"
    languageName = "简体中文"
    title = "Jun, To the Moon"
    weight = 4
    [languages.zh.params.sidebar]
      subtitle = "用 AI 学习，\n向机会发起挑战，\n在露营中喘口气。\n慢慢地，却坚定地 — 奔向月球。"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.tableOfContents]
    endLevel = 4
    ordered = true
    startLevel = 2
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = true
    lineNumbersInTable = true
    tabWidth = 4
